name: Rilis APK

# Trigger saat tag versi dibuat: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Diperlukan untuk membuat GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Beri permission executable ke gradlew
        run: chmod +x ./gradlew

      - name: Ambil versi dari tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Jalankan Unit Test
        run: ./gradlew testDebugUnitTest

      - name: Build APK Debug (untuk penggunaan pribadi)
        run: ./gradlew assembleDebug

      - name: Cek file APK
        run: ls -la app/build/outputs/apk/debug/

      - name: Rename APK dengan nomor versi
        run: |
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
          echo "Found APK: $APK"
          cp "$APK" "ketantech-kalkulator-v${{ steps.version.outputs.VERSION }}.apk"
          ls -la ketantech-kalkulator-v*.apk

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ketantech Kalkulator Servis v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 Ketantech Kalkulator Servis v${{ steps.version.outputs.VERSION }}

            Rilis otomatis dari tag `${{ github.ref_name }}`.

            ### Cara Install
            1. Download file `.apk` di bawah
            2. Buka file di HP Android
            3. Izinkan "Install dari sumber tidak dikenal" jika diminta
            4. Selesai ✅

            > APK ini ditandatangani dengan debug key — aman untuk penggunaan pribadi.
          files: ketantech-kalkulator-v*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
