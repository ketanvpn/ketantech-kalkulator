name: Android CI

# Build & test pada setiap push ke main dan setiap Pull Request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Beri permission executable ke gradlew
        run: chmod +x ./gradlew

      - name: Jalankan Unit Test
        run: ./gradlew testDebugUnitTest

      - name: Build APK Debug
        run: ./gradlew assembleDebug

      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ketantech-kalkulator-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
